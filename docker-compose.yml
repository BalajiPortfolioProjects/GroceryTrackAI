services:
  # ── Spring Boot API ────────────────────────────────────────────────────────
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      # Optional: set your OpenAI key for real AI receipt parsing
      # Without it, the app falls back to realistic mock parsed data
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:8080/api/dashboard" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── React + Nginx SPA ──────────────────────────────────────────────────────
  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
