services:
  # ── Spring Boot API ────────────────────────────────────────────────────────
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      # ── Set ONE of these depending on your chosen AI provider ──────────────
      # Option 1 — Google Gemini (FREE): aistudio.google.com/app/apikey
      - GEMINI_API_KEY=
      # Option 1 — Anthropic (PREFERRED): console.anthropic.com
      - ANTHROPIC_API_KEY=
      # ── Override any app.ai.* property at runtime if needed ────────────────
      - APP_AI_MODEL=claude-opus-4-6
      # - APP_AI_TEMPERATURE=0.1
      # - APP_AI_MAX_TOKENS=1024
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:8080/api/dashboard" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── React + Nginx SPA ──────────────────────────────────────────────────────
  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
