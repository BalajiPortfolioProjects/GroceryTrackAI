# ── Server ─────────────────────────────────────────────────────────────────
server.port=8080

# ── H2 Database ────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:grocerytrack;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ═══════════════════════════════════════════════════════════════════════════
# AI PROVIDER — pick ONE block below, set its env var, comment out the others
# ═══════════════════════════════════════════════════════════════════════════

# Anthropic Claude
spring.ai.anthropic.api-key=${ANTHROPIC_API_KEY:REPLACE_ME}
spring.ai.anthropic.chat.options.model=${APP_AI_MODEL:claude-3-5-sonnet-latest}
spring.ai.anthropic.chat.options.temperature=${app.ai.temperature}
spring.ai.anthropic.chat.options.max-tokens=${app.ai.max-tokens}

app.ai.api-key=${ANTHROPIC_API_KEY:REPLACE_ME}
app.ai.model=${APP_AI_MODEL:claude-3-5-sonnet-latest}
app.ai.temperature=0.1
app.ai.max-tokens=1024

# ── File upload ────────────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── Logging ────────────────────────────────────────────────────────────────
logging.level.com.grocerytrack=INFO
logging.level.org.springframework.ai=INFO
